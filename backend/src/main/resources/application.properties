spring.application.name=sales-management

# ── Server ──────────────────────────────────────────────
# Frontend (vite.config.js) proxy '/api' -> http://localhost:3001
server.port=3001

# ── Database (H2 in-memory) ──────────────────────────────
# Chạy ngay khong can cai dat gi them. Du lieu mat khi tat server (xem DataSeeder).
# De doi sang MySQL that, comment 4 dong duoi va dien thong tin ket noi:
# spring.datasource.url=jdbc:mysql://localhost:3306/sales_management?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:h2:mem:salesdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 console (debug): http://localhost:3001/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Jackson ───────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null

# ── Logging ──────────────────────────────────────────────
logging.level.com.company.sales_management=INFO
